name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action and the github-script steps create/update a GitHub Release
# and upload bundles, which needs write access to repo contents. Without
# this the default read-only GITHUB_TOKEN fails with "Resource not
# accessible by integration".
permissions:
  contents: write

jobs:
  # One job creates a single draft release up front so the parallel matrix
  # builds all upload into the SAME release (avoids the create-release race
  # where two OS jobs try to create the tag's release at once). It also
  # deletes a stale release for the tag first so re-runs start clean.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create (or recreate) the draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            // Remove any existing release for this tag (e.g. left by a
            // previously failed run) so assets never collide on re-run.
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Multi-app ${tag}`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - os: ubuntu-22.04
            args: ""
            rust_targets: ""
          - os: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up pnpm
        # Version is read from the `packageManager` field in package.json
        # (pnpm@11.8.0). Do not also pin it here — action-setup errors on a
        # mismatch (ERR_PNPM_BAD_PM_VERSION).
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.8.0 (from package.json packageManager) requires Node
          # >=22.13 — it imports the built-in node:sqlite module. Node 20
          # fails with ERR_UNKNOWN_BUILTIN_MODULE before install runs.
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional macOS signing secrets — add these in repo settings
          # to ship a notarized build; otherwise the .app is unsigned
          # and macOS users will see "developer cannot be verified"
          # on first launch.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Upload into the pre-created release by id — no per-job create.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Flip the release from draft to published once every OS bundle is in,
  # so it appears under "Releases" on the repo home page automatically.
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });
